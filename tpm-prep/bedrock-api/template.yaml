AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TPM Prep Bedrock Assessment API

Resources:
  AssessFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.handler
      Runtime: python3.12
      Timeout: 60
      MemorySize: 256
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Query:
          Type: Api
          Properties:
            Path: /assess
            Method: post
        Options:
          Type: Api
          Properties:
            Path: /assess
            Method: options

Outputs:
  ApiUrl:
    Description: API endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/assess"
